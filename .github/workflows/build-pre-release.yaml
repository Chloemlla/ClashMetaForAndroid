name: Build Release on Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/local-subscription-traffic

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  # Shared quality gates before packaging either flavor.
  Verify:
    if: github.repository_owner == 'Chloemlla' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.meta.outputs.version_name }}
      short_hash: ${{ steps.meta.outputs.short_hash }}
      meta_tag: ${{ steps.meta.outputs.meta_tag }}
      alpha_tag: ${{ steps.meta.outputs.alpha_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Set release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME=$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' build.gradle.kts | head -n 1)
          SHORT_HASH=$(git rev-parse --short=7 HEAD)
          test -n "$VERSION_NAME"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "short_hash=$SHORT_HASH" >> "$GITHUB_OUTPUT"
          echo "meta_tag=v${VERSION_NAME}-${SHORT_HASH}" >> "$GITHUB_OUTPUT"
          echo "alpha_tag=v${VERSION_NAME}-${SHORT_HASH}-alpha" >> "$GITHUB_OUTPUT"

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          cache: false
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: '1.26'

      - name: Apply Patches
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd "$(go env GOROOT)"
          patches=("$GITHUB_WORKSPACE"/.github/patch/*.patch)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No Go patches found under .github/patch" >&2
            exit 1
          fi
          for p in "${patches[@]}"; do
            patch --verbose -p 1 < "$p"
          done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('core/src/foss/golang/go.sum', 'core/src/main/golang/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt


      - name: Resolve lumen-crash version
        env:
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/resolve-lumen-crash-version.sh
      - name: Repository policy checks
        run: python3 .github/scripts/verify-repository-policy.py

      - name: JVM unit tests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-jvm-tests.py

      - name: Upload JVM test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: push-release-jvm-test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: warn

      - name: Android Lint (Meta + Alpha)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-android-lint.py lintMetaRelease lintAlphaRelease

      - name: Print full Android Lint reports
        if: always()
        run: bash .github/scripts/print-lint-reports.sh

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: push-release-android-lint-reports
          path: |
            **/build/reports/lint-results-*.*
            **/build/intermediates/lint_intermediate_text_report/**/lint-results-*.txt
            **/build/reports/lint-results-*.html
          if-no-files-found: warn

  MetaRelease:
    needs: Verify
    if: github.repository_owner == 'Chloemlla' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          cache: false
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: '1.26'

      - name: Apply Patches
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd "$(go env GOROOT)"
          patches=("$GITHUB_WORKSPACE"/.github/patch/*.patch)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No Go patches found under .github/patch" >&2
            exit 1
          fi
          for p in "${patches[@]}"; do
            patch --verbose -p 1 < "$p"
          done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('core/src/foss/golang/go.sum', 'core/src/main/golang/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Resolve lumen-crash version
        env:
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/resolve-lumen-crash-version.sh
      - name: Prepare release signing (GitHub secrets only)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bash .github/scripts/prepare-signing.sh

      - name: Build signed Meta release APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -f signing.properties
          ./gradlew app:assembleMetaRelease

      - name: Stage secret-signed Meta APKs
        run: bash .github/scripts/stage-signed-apks.sh app/build/ci-apks/meta-release

      - name: Publish Meta full release (latest)
        # Feature-branch push builds APKs for validation; only main publishes releases.
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: ${{ needs.Verify.outputs.meta_tag }}
          prerelease: false
          name: ClashMetaForAndroid ${{ needs.Verify.outputs.version_name }} (${{ needs.Verify.outputs.short_hash }})
          files: |
            app/build/ci-apks/meta-release/*.apk
            app/build/ci-apks/meta-release/SHA256SUMS

      - name: Remove signing credentials
        if: always()
        run: rm -f signing.properties "$RUNNER_TEMP/cmfa-release.keystore"

  AlphaPreRelease:
    needs: Verify
    if: github.repository_owner == 'Chloemlla' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          cache: false
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: '1.26'

      - name: Apply Patches
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd "$(go env GOROOT)"
          patches=("$GITHUB_WORKSPACE"/.github/patch/*.patch)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No Go patches found under .github/patch" >&2
            exit 1
          fi
          for p in "${patches[@]}"; do
            patch --verbose -p 1 < "$p"
          done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('core/src/foss/golang/go.sum', 'core/src/main/golang/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Resolve lumen-crash version
        env:
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/resolve-lumen-crash-version.sh
      - name: Prepare release signing (GitHub secrets only)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bash .github/scripts/prepare-signing.sh

      - name: Build signed Alpha release APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -f signing.properties
          ./gradlew app:assembleAlphaRelease

      - name: Stage secret-signed Alpha APKs
        run: bash .github/scripts/stage-signed-apks.sh app/build/ci-apks/alpha-release

      - name: Prepare Alpha migration APK aliases
        run: |
          set -euo pipefail
          release_dir=app/build/ci-apks/alpha-release
          migration_dir=app/build/ci-apks/alpha-migration-release
          mkdir -p "$migration_dir"
          mapfile -t apks < <(find "$release_dir" -type f -name '*.apk' | sort)
          test "${#apks[@]}" -gt 0
          : > "$migration_dir/SHA256SUMS-migration"
          for apk in "${apks[@]}"; do
            name=$(basename "$apk")
            migration_name=${name/-alpha-/-alpha-migration-}
            if [ "$migration_name" = "$name" ]; then
              migration_name=${name%.apk}-migration.apk
            fi
            cp -f "$apk" "$migration_dir/$migration_name"
            (cd "$migration_dir" && sha256sum "$migration_name") >> "$migration_dir/SHA256SUMS-migration"
          done

      - name: Publish Alpha pre-release
        # Feature-branch push builds APKs for validation; only main publishes releases.
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: false
          generate_release_notes: true
          tag_name: ${{ needs.Verify.outputs.alpha_tag }}
          prerelease: true
          name: ClashMetaForAndroid Alpha ${{ needs.Verify.outputs.version_name }}-${{ needs.Verify.outputs.short_hash }}
          files: |
            app/build/ci-apks/alpha-release/*.apk
            app/build/ci-apks/alpha-release/SHA256SUMS
            app/build/ci-apks/alpha-migration-release/*.apk
            app/build/ci-apks/alpha-migration-release/SHA256SUMS-migration

      - name: Remove signing credentials
        if: always()
        run: rm -f signing.properties "$RUNNER_TEMP/cmfa-release.keystore"
