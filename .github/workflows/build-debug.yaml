name: Build Debug

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
  # main already runs the heavier pre-release pipeline; keep debug for PRs / manual runs.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  BuildDebug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: '1.26'

      - name: Apply Patches
        run: |
          cd "$(go env GOROOT)"
          for p in "$GITHUB_WORKSPACE"/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Repository policy checks
        run: python3 .github/scripts/verify-repository-policy.py

      - name: Release signing must fail without credentials
        shell: bash
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          # Keep daemon for later steps in this job; only need the configuration error text.
          output=$(./gradlew app:assembleMetaRelease 2>&1)
          status=$?
          set -e
          test "$status" -ne 0
          grep -F "Release signing is required" <<< "$output"

      - name: JVM unit tests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-jvm-tests.py

      - name: Upload JVM test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-jvm-test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: warn

      - name: Android Lint
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-android-lint.py lintAlphaDebug

      - name: Print full Android Lint reports
        if: always()
        run: bash .github/scripts/print-lint-reports.sh

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-android-lint-reports
          path: |
            **/build/reports/lint-results-*.*
            **/build/intermediates/lint_intermediate_text_report/**/lint-results-*.txt
            **/build/reports/lint-results-*.html
          if-no-files-found: warn

      - name: Build debug APK (arm64 only)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        # PR/debug validation does not need 4 ABIs + universal; arm64 covers primary devices.
        # ABI splits place per-ABI APKs under nested dirs (…/debug/<abi>/…), so do not rely on
        # a flat …/debug/*.apk layout for upload.
        run: |
          ./gradlew app:assembleAlphaDebug -Pandroid.injected.build.abi=arm64-v8a
          echo "Debug APK outputs:"
          find app/build/outputs/apk/alpha/debug -type f -name '*.apk' -print
          test -n "$(find app/build/outputs/apk/alpha/debug -type f -name '*.apk' -print -quit)"

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: CMFA Debug APKs
          # Nested ABI split dirs: app/build/outputs/apk/alpha/debug/**/*.apk
          path: app/build/outputs/apk/alpha/debug/**/*.apk
          if-no-files-found: error
