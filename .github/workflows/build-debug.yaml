name: Build Debug

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
  # main already runs the heavier pre-release pipeline; keep debug for PRs / manual runs.
  # Manual dispatch can also publish a signed Alpha pre-release.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  BuildDebug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Set Alpha release metadata
        id: meta
        shell: bash
        run: |
          VERSION_NAME=$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' build.gradle.kts | head -n 1)
          SHORT_HASH=$(git rev-parse --short=7 HEAD)
          test -n "$VERSION_NAME"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "short_hash=$SHORT_HASH" >> "$GITHUB_OUTPUT"
          echo "alpha_tag=v${VERSION_NAME}-${SHORT_HASH}-alpha" >> "$GITHUB_OUTPUT"

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: '1.26'

      - name: Apply Patches
        run: |
          cd "$(go env GOROOT)"
          for p in "$GITHUB_WORKSPACE"/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Repository policy checks
        run: python3 .github/scripts/verify-repository-policy.py

      - name: Release signing must fail without credentials
        shell: bash
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          # Keep daemon for later steps in this job; only need the configuration error text.
          # Ensure no leftover signing.properties can soft-succeed this negative check.
          rm -f signing.properties
          output=$(./gradlew app:assembleMetaRelease 2>&1)
          status=$?
          set -e
          test "$status" -ne 0
          # CI path must require GitHub secrets; local wording still accepted as fallback.
          grep -F "Release signing is required" <<< "$output"

      - name: JVM unit tests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-jvm-tests.py

      - name: Upload JVM test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-jvm-test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: warn

      - name: Android Lint
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-android-lint.py lintAlphaDebug

      - name: Print full Android Lint reports
        if: always()
        run: bash .github/scripts/print-lint-reports.sh

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-android-lint-reports
          path: |
            **/build/reports/lint-results-*.*
            **/build/intermediates/lint_intermediate_text_report/**/lint-results-*.txt
            **/build/reports/lint-results-*.html
          if-no-files-found: warn

      - name: Prepare release signing (GitHub secrets only)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bash .github/scripts/prepare-signing.sh

      - name: Build signed Alpha release APK (arm64 only)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        # PR/debug validation does not need 4 ABIs + universal; arm64 covers primary devices.
        # AGP ABI-split / injected-ABI output layout varies; stage via secret-keystore verifier.
        run: |
          set -euo pipefail
          test -f signing.properties
          ./gradlew app:assembleAlphaRelease -Pandroid.injected.build.abi=arm64-v8a
          echo "APK tree under app/build/outputs:"
          if [ -d app/build/outputs ]; then
            find app/build/outputs -type f -name '*.apk' -print || true
            find app/build/outputs -type d -print | head -n 80 || true
          else
            echo "app/build/outputs is missing"
            find app/build -maxdepth 4 -type d -print | head -n 80 || true
          fi

      - name: Stage secret-signed Alpha APKs
        run: bash .github/scripts/stage-signed-apks.sh app/build/ci-apks/alpha-release

      - name: Prepare Alpha migration APK aliases
        run: |
          set -euo pipefail
          release_dir=app/build/ci-apks/alpha-release
          migration_dir=app/build/ci-apks/alpha-migration-release
          mkdir -p "$migration_dir"
          mapfile -t apks < <(find "$release_dir" -type f -name '*.apk' | sort)
          test "${#apks[@]}" -gt 0
          : > "$migration_dir/SHA256SUMS-migration"
          for apk in "${apks[@]}"; do
            name=$(basename "$apk")
            migration_name=${name/-alpha-/-alpha-migration-}
            if [ "$migration_name" = "$name" ]; then
              migration_name=${name%.apk}-migration.apk
            fi
            cp -f "$apk" "$migration_dir/$migration_name"
            (cd "$migration_dir" && sha256sum "$migration_name") >> "$migration_dir/SHA256SUMS-migration"
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: CMFA Alpha Release APKs
          path: |
            app/build/ci-apks/alpha-release/*.apk
            app/build/ci-apks/alpha-release/SHA256SUMS
            app/build/ci-apks/alpha-migration-release/*.apk
            app/build/ci-apks/alpha-migration-release/SHA256SUMS-migration
          if-no-files-found: error

      # Avoid PR noise: only manual runs publish GitHub pre-releases.
      - name: Publish Alpha pre-release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: false
          generate_release_notes: true
          tag_name: ${{ steps.meta.outputs.alpha_tag }}
          prerelease: true
          name: ClashMetaForAndroid Alpha ${{ steps.meta.outputs.version_name }}-${{ steps.meta.outputs.short_hash }}
          files: |
            app/build/ci-apks/alpha-release/*.apk
            app/build/ci-apks/alpha-release/SHA256SUMS
            app/build/ci-apks/alpha-migration-release/*.apk
            app/build/ci-apks/alpha-migration-release/SHA256SUMS-migration

      - name: Remove signing credentials
        if: always()
        run: rm -f signing.properties "$RUNNER_TEMP/cmfa-release.keystore"
