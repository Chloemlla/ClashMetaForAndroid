name: Build Debug

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  BuildDebug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: '1.26'

      - name: Apply Patches
        run: |
          cd "$(go env GOROOT)"
          for p in "$GITHUB_WORKSPACE"/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Repository policy checks
        run: python3 .github/scripts/verify-repository-policy.py

      - name: Release signing must fail without credentials
        shell: bash
        run: |
          set +e
          output=$(./gradlew --no-daemon app:assembleMetaRelease 2>&1)
          status=$?
          set -e
          test "$status" -ne 0
          grep -F "Release signing is required" <<< "$output"

      - name: JVM unit tests
        run: python3 .github/scripts/run-jvm-tests.py

      - name: Upload JVM test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-jvm-test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: warn

      - name: Android Lint
        run: python3 .github/scripts/run-android-lint.py lintAlphaDebug

      - name: Print full Android Lint reports
        if: always()
        run: bash .github/scripts/print-lint-reports.sh

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-android-lint-reports
          path: |
            **/build/reports/lint-results-*.*
            **/build/intermediates/lint_intermediate_text_report/**/lint-results-*.txt
            **/build/reports/lint-results-*.html
          if-no-files-found: warn

      - name: Build debug APKs
        run: ./gradlew --no-daemon app:assembleAlphaDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: CMFA Debug APKs
          path: app/build/outputs/apk/alpha/debug/*.apk
