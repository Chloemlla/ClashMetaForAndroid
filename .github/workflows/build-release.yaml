name: Build Release

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release Tag (v2.x.x)
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs['release-tag'] }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  BuildRelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Validate release source and set version
        env:
          RELEASE_TAG: ${{ inputs['release-tag'] }}
        run: |
          test "$GITHUB_REF" = refs/heads/main
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          VERSION_NAME=${RELEASE_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          VERSION_CODE=$(printf '%d%02d%03d' "$((10#$MAJOR))" "$((10#$MINOR))" "$((10#$PATCH))")
          python3 - "$VERSION_NAME" "$VERSION_CODE" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path("build.gradle.kts")
          text = path.read_text(encoding="utf-8")
          text, name_count = re.subn(
              r'versionName = "[^"]+"', f'versionName = "{sys.argv[1]}"', text, count=1
          )
          text, code_count = re.subn(
              r'versionCode = [0-9]+', f'versionCode = {sys.argv[2]}', text, count=1
          )
          if name_count != 1 or code_count != 1:
              raise SystemExit("unable to update version fields")
          path.write_text(text, encoding="utf-8")
          PY
          echo "CMFA_RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "CMFA_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "CMFA_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-download-base-url: https://github.com/MetaCubeX/go/releases/download/build
          go-version: '1.26'

      - name: Apply Patches
        run: |
          cd "$(go env GOROOT)"
          for p in "$GITHUB_WORKSPACE"/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Repository policy checks
        run: python3 .github/scripts/verify-repository-policy.py

      - name: JVM unit tests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-jvm-tests.py

      - name: Upload JVM test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-jvm-test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: warn

      - name: Android Lint
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/run-android-lint.py lintMetaRelease

      - name: Print full Android Lint reports
        if: always()
        run: bash .github/scripts/print-lint-reports.sh

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-android-lint-reports
          path: |
            **/build/reports/lint-results-*.*
            **/build/intermediates/lint_intermediate_text_report/**/lint-results-*.txt
            **/build/reports/lint-results-*.html
          if-no-files-found: warn

      - name: Prepare signing credentials
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          : "${KEYSTORE_BASE64:?KEYSTORE_BASE64 is required}"
          : "${KEYSTORE_PASSWORD:?KEYSTORE_PASSWORD is required}"
          : "${KEY_ALIAS:?KEY_ALIAS is required}"
          : "${KEY_PASSWORD:?KEY_PASSWORD is required}"
          KEYSTORE_FILE="$RUNNER_TEMP/cmfa-release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"
          chmod 600 "$KEYSTORE_FILE"
          printf '%s\n' \
            "keystore.file=$KEYSTORE_FILE" \
            "keystore.password=$KEYSTORE_PASSWORD" \
            "key.alias=$KEY_ALIAS" \
            "key.password=$KEY_PASSWORD" \
            > signing.properties

      - name: Build signed release APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.LUMEN_CRASH_READ_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./gradlew app:assembleMetaRelease

      - name: Generate APK checksums
        run: |
          cd app/build/outputs/apk/meta/release
          sha256sum ./*.apk > SHA256SUMS

      - name: Commit version and push verified tag
        run: |
          git diff --check
          if git rev-parse -q --verify "refs/tags/$CMFA_RELEASE_TAG" >/dev/null; then
            echo "Tag already exists: $CMFA_RELEASE_TAG" >&2
            exit 1
          fi
          git config user.name 'GitHub Actions'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet -- build.gradle.kts; then
            git add build.gradle.kts
            git commit -m "Bump version to $CMFA_VERSION_NAME ($CMFA_VERSION_CODE)"
          fi
          git tag -a "$CMFA_RELEASE_TAG" -m "ClashMetaForAndroid $CMFA_VERSION_NAME"
          git push --atomic origin HEAD:main "refs/tags/$CMFA_RELEASE_TAG"

      - name: Automatic release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
          generate_release_notes: true
          tag_name: ${{ env.CMFA_RELEASE_TAG }}
          prerelease: false
          name: ClashMetaForAndroid ${{ env.CMFA_VERSION_NAME }}
          files: |
            app/build/outputs/apk/meta/release/*.apk
            app/build/outputs/apk/meta/release/SHA256SUMS

      - name: Remove signing credentials
        if: always()
        run: rm -f signing.properties "$RUNNER_TEMP/cmfa-release.keystore"
